openapi: 3.0.3
info:
  title: 'DOMPET Backend API API Documentation'
  description: 'Dokumentasi endpoint API untuk backend DOMPET/Zaku.'
  version: 1.0.0
servers:
  -
    url: 'http://127.0.0.1:8000'
tags:
  -
    name: Authentication
    description: ''
  -
    name: API
    description: ''
components:
  securitySchemes:
    default:
      type: http
      scheme: bearer
      description: 'Dapatkan token dari endpoint <code>POST /api/auth/login</code>, lalu kirim sebagai Bearer token.'
security:
  -
    default: []
paths:
  /api/auth/register:
    post:
      summary: 'Register user'
      operationId: registerUser
      description: 'Membuat user baru, wallet default, kode verifikasi email, dan JWT token.'
      parameters: []
      responses:
        201:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  status: success
                  message: 'User registered successfully'
                  data:
                    user:
                      id: 1
                      full_name: 'John Doe'
                      email: user@example.com
                      phone_number: '08123456789'
                      is_verified: false
                      last_login_at: null
                      wallet:
                        id: 1
                        user_id: 1
                        balance: '0.00'
                        status: active
                    token: jwt_token_here
                properties:
                  status:
                    type: string
                    example: success
                  message:
                    type: string
                    example: 'User registered successfully'
                  data:
                    type: object
                    properties:
                      user:
                        type: object
                        properties:
                          id:
                            type: integer
                            example: 1
                          full_name:
                            type: string
                            example: 'John Doe'
                          email:
                            type: string
                            example: user@example.com
                          phone_number:
                            type: string
                            example: '08123456789'
                          is_verified:
                            type: boolean
                            example: false
                          last_login_at:
                            type: string
                            example: null
                            nullable: true
                          wallet:
                            type: object
                            properties:
                              id:
                                type: integer
                                example: 1
                              user_id:
                                type: integer
                                example: 1
                              balance:
                                type: string
                                example: '0.00'
                              status:
                                type: string
                                example: active
                      token:
                        type: string
                        example: jwt_token_here
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  description: 'Email user.'
                  example: user@example.com
                password:
                  type: string
                  description: 'Minimal 8 karakter.'
                  example: password123
                name:
                  type: string
                  description: 'This field is required when <code>full_name</code> is not present. Must not be greater than 255 characters.'
                  example: vmqeopfuudtdsufvyvddq
                full_name:
                  type: string
                  description: 'Nama lengkap user.'
                  example: 'John Doe'
                phone_number:
                  type: string
                  description: 'Nomor telepon opsional.'
                  example: '08123456789'
                  nullable: true
              required:
                - email
                - password
                - full_name
      security: []
  /api/auth/login:
    post:
      summary: 'Login user'
      operationId: loginUser
      description: 'Mengautentikasi user yang email-nya sudah diverifikasi dan mengembalikan JWT token.'
      parameters: []
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  status: success
                  message: 'Login successful'
                  data:
                    token: jwt_token_here
                    user:
                      id: 1
                      full_name: 'John Doe'
                      email: user@example.com
                      is_verified: true
                properties:
                  status:
                    type: string
                    example: success
                  message:
                    type: string
                    example: 'Login successful'
                  data:
                    type: object
                    properties:
                      token:
                        type: string
                        example: jwt_token_here
                      user:
                        type: object
                        properties:
                          id:
                            type: integer
                            example: 1
                          full_name:
                            type: string
                            example: 'John Doe'
                          email:
                            type: string
                            example: user@example.com
                          is_verified:
                            type: boolean
                            example: true
        401:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  status: error
                  message: 'Invalid credentials.'
                properties:
                  status:
                    type: string
                    example: error
                  message:
                    type: string
                    example: 'Invalid credentials.'
        403:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  status: error
                  message: 'Email address is not verified.'
                properties:
                  status:
                    type: string
                    example: error
                  message:
                    type: string
                    example: 'Email address is not verified.'
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  description: 'Email user.'
                  example: user@example.com
                password:
                  type: string
                  description: 'Password user.'
                  example: password123
              required:
                - email
                - password
      security: []
  /api/auth/verify-email:
    post:
      summary: 'Verify email'
      operationId: verifyEmail
      description: 'Memvalidasi kode verifikasi dan menandai email user sebagai terverifikasi.'
      parameters: []
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  status: success
                  message: 'Email verified successfully'
                properties:
                  status:
                    type: string
                    example: success
                  message:
                    type: string
                    example: 'Email verified successfully'
        422:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  status: error
                  message: 'Verification code has expired.'
                properties:
                  status:
                    type: string
                    example: error
                  message:
                    type: string
                    example: 'Verification code has expired.'
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  description: 'Email user yang akan diverifikasi. Must be a valid email address.'
                  example: user@example.com
                code:
                  type: string
                  description: 'Kode verifikasi 6 digit dari email/log.'
                  example: '123456'
                user_id:
                  type: integer
                  description: 'ID user yang akan diverifikasi.'
                  example: 1
              required:
                - email
                - code
                - user_id
      security: []
  /api/auth/resend-verification:
    post:
      summary: 'Resend verification code'
      operationId: resendVerificationCode
      description: 'Mengirim ulang kode verifikasi untuk user yang belum terverifikasi.'
      parameters: []
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  status: success
                  message: 'Verification code sent to your email'
                properties:
                  status:
                    type: string
                    example: success
                  message:
                    type: string
                    example: 'Verification code sent to your email'
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  description: 'Email user.'
                  example: user@example.com
              required:
                - email
      security: []
  /api/auth/forgot-password:
    post:
      summary: 'Forgot password'
      operationId: forgotPassword
      description: 'Membuat token reset password dan mengirimkannya ke email user.'
      parameters: []
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  status: success
                  message: 'Password reset link sent to your email'
                properties:
                  status:
                    type: string
                    example: success
                  message:
                    type: string
                    example: 'Password reset link sent to your email'
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  description: 'Email user.'
                  example: user@example.com
              required:
                - email
      security: []
  /api/auth/change-password:
    post:
      summary: 'Change password'
      operationId: changePassword
      description: 'Mengubah password user yang sedang login. Endpoint ini membutuhkan JWT Bearer token.'
      parameters: []
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  status: success
                  message: 'Password changed successfully'
                properties:
                  status:
                    type: string
                    example: success
                  message:
                    type: string
                    example: 'Password changed successfully'
        401:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  status: error
                  message: 'Authorization token is required.'
                properties:
                  status:
                    type: string
                    example: error
                  message:
                    type: string
                    example: 'Authorization token is required.'
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                old_password:
                  type: string
                  description: 'Password lama.'
                  example: password123
                new_password:
                  type: string
                  description: 'Password baru minimal 8 karakter.'
                  example: password456
                new_password_confirmation:
                  type: string
                  description: 'Konfirmasi password baru.'
                  example: password456
              required:
                - old_password
                - new_password
                - new_password_confirmation
  /api/auth/me:
    get:
      summary: 'Get authenticated user profile'
      operationId: getAuthenticatedUserProfile
      description: 'Mengambil data profil user yang sedang login.'
      parameters: []
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  status: success
                  data:
                    id: 1
                    name: 'John Doe'
                    email: user@example.com
                properties:
                  status:
                    type: string
                    example: success
                  data:
                    type: object
                    properties:
                      id:
                        type: integer
                        example: 1
                      name:
                        type: string
                        example: 'John Doe'
                      email:
                        type: string
                        example: user@example.com
      tags:
        - Authentication
  /api/auth/refresh:
    post:
      summary: 'Refresh JWT token'
      operationId: refreshJWTToken
      description: 'Membuat token JWT baru dan menginvalidasi token lama.'
      parameters: []
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  status: success
                  data:
                    access_token: jwt_token_here
                    refresh_token: jwt_token_here
                properties:
                  status:
                    type: string
                    example: success
                  data:
                    type: object
                    properties:
                      access_token:
                        type: string
                        example: jwt_token_here
                      refresh_token:
                        type: string
                        example: jwt_token_here
      tags:
        - Authentication
  /api/auth/logout:
    post:
      summary: 'Logout user'
      operationId: logoutUser
      description: 'Menginvalidasi token JWT yang sedang digunakan.'
      parameters: []
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  status: success
                  message: 'Successfully logged out'
                properties:
                  status:
                    type: string
                    example: success
                  message:
                    type: string
                    example: 'Successfully logged out'
      tags:
        - Authentication
  /api/user/profile:
    get:
      summary: ''
      operationId: getApiUserProfile
      description: ''
      parameters: []
      responses:
        401:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  message: 'Token not provided'
                properties:
                  message:
                    type: string
                    example: 'Token not provided'
      tags:
        - API
      security: []
    put:
      summary: ''
      operationId: putApiUserProfile
      description: ''
      parameters: []
      responses: {  }
      tags:
        - API
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: 'Nama lengkap user. Must not be greater than 255 characters.'
                  example: 'Budi Santoso'
                email:
                  type: string
                  description: 'Email unik user. Must be a valid email address. Must not be greater than 255 characters.'
                  example: budi@example.com
              required:
                - name
                - email
      security: []
  /api/user/budget:
    put:
      summary: ''
      operationId: putApiUserBudget
      description: ''
      parameters: []
      responses: {  }
      tags:
        - API
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                monthly_budget:
                  type: integer
                  description: 'Budget bulanan dalam integer IDR. Must be at least 0.'
                  example: 3000000
              required:
                - monthly_budget
      security: []
  /api/dashboard:
    get:
      summary: ''
      operationId: getApiDashboard
      description: ''
      parameters: []
      responses:
        401:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  message: 'Token not provided'
                properties:
                  message:
                    type: string
                    example: 'Token not provided'
      tags:
        - API
      security: []
  /api/transactions:
    get:
      summary: ''
      operationId: getApiTransactions
      description: ''
      parameters: []
      responses:
        401:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  message: 'Token not provided'
                properties:
                  message:
                    type: string
                    example: 'Token not provided'
      tags:
        - API
      security: []
  /api/transactions/stats:
    get:
      summary: ''
      operationId: getApiTransactionsStats
      description: ''
      parameters: []
      responses:
        401:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  message: 'Token not provided'
                properties:
                  message:
                    type: string
                    example: 'Token not provided'
      tags:
        - API
      security: []
  /api/transactions/categories:
    get:
      summary: ''
      operationId: getApiTransactionsCategories
      description: ''
      parameters: []
      responses:
        401:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  message: 'Token not provided'
                properties:
                  message:
                    type: string
                    example: 'Token not provided'
      tags:
        - API
      security: []
  '/api/transactions/{id}':
    get:
      summary: ''
      operationId: getApiTransactionsId
      description: ''
      parameters: []
      responses:
        401:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  message: 'Token not provided'
                properties:
                  message:
                    type: string
                    example: 'Token not provided'
      tags:
        - API
      security: []
    parameters:
      -
        in: path
        name: id
        description: 'The ID of the transaction.'
        example: consequatur
        required: true
        schema:
          type: string
  /api/transactions/chat:
    post:
      summary: ''
      operationId: postApiTransactionsChat
      description: ''
      parameters: []
      responses: {  }
      tags:
        - API
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                message:
                  type: string
                  description: 'Input teks natural language untuk dicatat sebagai transaksi. Must be at least 3 characters. Must not be greater than 500 characters.'
                  example: 'Beli kopi di Starbucks 65 ribu'
              required:
                - message
      security: []
  /api/wallet/balance:
    get:
      summary: ''
      operationId: getApiWalletBalance
      description: ''
      parameters: []
      responses:
        401:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  message: 'Token not provided'
                properties:
                  message:
                    type: string
                    example: 'Token not provided'
      tags:
        - API
      security: []
  /api/wallet/topup:
    post:
      summary: ''
      operationId: postApiWalletTopup
      description: ''
      parameters: []
      responses: {  }
      tags:
        - API
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                amount:
                  type: integer
                  description: 'Nominal transaksi wallet dalam integer IDR. Must be at least 1.'
                  example: 100000
              required:
                - amount
      security: []
  /api/wallet/withdraw:
    post:
      summary: ''
      operationId: postApiWalletWithdraw
      description: ''
      parameters: []
      responses: {  }
      tags:
        - API
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                amount:
                  type: integer
                  description: 'Nominal transaksi wallet dalam integer IDR. Must be at least 1.'
                  example: 100000
                account_number:
                  type: string
                  description: 'Nomor rekening tujuan penarikan. Must not be greater than 50 characters.'
                  example: '1234567890'
              required:
                - amount
                - account_number
      security: []
  /api/wallet/send:
    post:
      summary: ''
      operationId: postApiWalletSend
      description: ''
      parameters: []
      responses: {  }
      tags:
        - API
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                amount:
                  type: integer
                  description: 'Nominal transaksi wallet dalam integer IDR. Must be at least 1.'
                  example: 100000
                recipient_email:
                  type: string
                  description: 'Email penerima yang sudah terdaftar. Must be a valid email address. The <code>email</code> of an existing record in the users table. Must not be one of <code></code>.'
                  example: user@email.com
                note:
                  type: string
                  description: 'Catatan transfer opsional. Must not be greater than 255 characters.'
                  example: opsional
                  nullable: true
              required:
                - amount
                - recipient_email
      security: []
